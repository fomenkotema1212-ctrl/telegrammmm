<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TGMessenger</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Темы */
        body.default {
            --bg-page: #ffffff;
            --bg-header: #ffffff;
            --bg-list: #ffffff;
            --bg-chat: #ffffff;
            --card: #f0f0f0;
            --border: #e0e0e0;
            --text: #000000;
            --text-secondary: #707579;
            --accent: #3390ec;
            --message-out: #e4e6eb;
            --message-in: #3390ec;
            --tab-icon: #8e8e93;
        }

        body.dark {
            --bg-page: #0f0f12;
            --bg-header: #1c1c1e;
            --bg-list: #1c1c1e;
            --bg-chat: #0f0f12;
            --card: #2c2c2e;
            --border: #2c2c2e;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --accent: #3390ec;
            --message-out: #2c2c2e;
            --message-in: #3390ec;
            --tab-icon: #8e8e93;
        }

        body.cold {
            --bg-page: #0e2a3a;
            --bg-header: #0e2a3a;
            --bg-list: #0e2a3a;
            --bg-chat: #0e2a3a;
            --card: #1a3a4a;
            --border: #1a4a5a;
            --text: #e0f0ff;
            --text-secondary: #aaccdd;
            --accent: #66ccff;
            --message-out: #1a4a5a;
            --message-in: #66ccff;
            --tab-icon: #88aabb;
        }

        body {
            background: var(--bg-page);
        }

        /* Экран входа */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-page);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .auth-card {
            background: var(--bg-list);
            padding: 32px 24px;
            border-radius: 28px;
            width: 85%;
            max-width: 320px;
            text-align: center;
        }

        .auth-card h2 {
            color: var(--accent);
            margin-bottom: 20px;
        }

        .auth-avatar {
            margin-bottom: 20px;
        }

        .avatar-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--card);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid var(--accent);
        }

        .auth-card input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: var(--card);
            border: none;
            border-radius: 20px;
            color: var(--text);
            font-size: 16px;
        }

        .auth-card button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 28px;
            font-weight: bold;
            margin-top: 16px;
            color: white;
            cursor: pointer;
        }

        /* Основное приложение */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-page);
        }

        /* Шапка */
        .header {
            background: var(--bg-header);
            padding: 12px 16px;
            padding-top: env(safe-area-inset-top, 12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name {
            font-weight: bold;
            color: var(--text);
            font-size: 17px;
        }

        .my-id {
            font-size: 13px;
            color: var(--accent);
            background: transparent;
            padding: 4px 8px;
        }

        /* Нижняя навигация */
        .bottom-nav {
            display: flex;
            background: var(--bg-header);
            padding: 8px 0;
            padding-bottom: env(safe-area-inset-bottom, 8px);
            border-top: 0.5px solid var(--border);
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            color: var(--tab-icon);
            cursor: pointer;
            font-size: 12px;
        }

        .nav-item span {
            font-size: 24px;
            display: block;
        }

        .nav-item.active {
            color: var(--accent);
        }

        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-list);
        }

        .panel {
            display: none;
            height: 100%;
            overflow-y: auto;
        }

        .panel.active {
            display: block;
        }

        /* Список чатов */
        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--border);
            cursor: pointer;
            background: var(--bg-list);
        }

        .chat-item:active {
            background: var(--card);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 28px;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 500;
            color: var(--text);
            font-size: 16px;
        }

        .chat-preview {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .add-btn {
            margin: 16px;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            width: calc(100% - 32px);
            cursor: pointer;
        }

        /* Настройки */
        .settings-section {
            margin-top: 16px;
        }

        .settings-header {
            padding: 8px 16px;
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
        }

        .setting-item {
            padding: 14px 16px;
            background: var(--bg-list);
            border-bottom: 0.5px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text);
            cursor: pointer;
        }

        .theme-row {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: var(--bg-list);
            flex-wrap: wrap;
        }

        .theme-chip {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--card);
            border-radius: 28px;
            cursor: pointer;
            color: var(--text);
            min-width: 80px;
        }

        .theme-chip.active {
            background: var(--accent);
            color: white;
        }

        /* Экран чата */
        .chat-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .chat-header {
            padding: 12px 16px;
            padding-top: env(safe-area-inset-top, 12px);
            background: var(--bg-header);
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 0.5px solid var(--border);
        }

        .chat-back {
            font-size: 28px;
            cursor: pointer;
            color: var(--accent);
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .chat-header-name {
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            background: var(--message-out);
            color: var(--text);
            align-self: flex-start;
        }

        .message.my {
            align-self: flex-end;
            background: var(--message-in);
            color: white;
        }

        .message-text {
            font-size: 15px;
        }

        .message img {
            max-width: 200px;
            border-radius: 14px;
        }

        .video-msg {
            width: 180px;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        .video-msg video {
            width: 100%;
            height: auto;
        }

        .video-play {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: white;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .input-bar {
            display: flex;
            gap: 10px;
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
            background: var(--bg-header);
            border-top: 0.5px solid var(--border);
        }

        .input-bar input {
            flex: 1;
            background: var(--card);
            border: none;
            padding: 12px;
            border-radius: 28px;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        .input-bar button, .input-bar label {
            background: var(--card);
            width: 46px;
            text-align: center;
            line-height: 46px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 20px;
            border: none;
            color: var(--text);
        }

        .record-btn {
            background: #ff4444 !important;
            color: white !important;
        }

        .record-btn.recording {
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 8px 20px;
            border-radius: 28px;
            font-size: 14px;
            z-index: 1100;
        }
    </style>
</head>
<body class="dark">

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h2>🔐 TGMessenger</h2>
        <div class="auth-avatar">
            <div class="avatar-circle" id="regAvatarBtn">
                <span id="regAvatarEmoji">👤</span>
            </div>
        </div>
        <input type="text" id="authLogin" placeholder="Логин">
        <input type="password" id="authPassword" placeholder="Пароль">
        <input type="file" id="regAvatarInput" accept="image/*" style="display: none;">
        <button id="loginBtn">Войти / Создать</button>
    </div>
</div>

<div id="appMain" style="display: none;" class="app">
    <div class="header">
        <div class="user-info">
            <div class="user-avatar" id="changeAvatarBtn">
                <span id="headerAvatarEmoji">👤</span>
            </div>
            <div class="user-name" id="currentUsername"></div>
            <div class="my-id" id="myUserId"></div>
        </div>
    </div>

    <div class="content">
        <!-- Чаты - только личные -->
        <div id="chatsPanel" class="panel active">
            <button class="add-btn" id="addFriendBtn">➕ Добавить друга</button>
            <div id="chatsList"></div>
        </div>
        
        <!-- Контакты -->
        <div id="contactsPanel" class="panel">
            <div id="contactsList"></div>
        </div>
        
        <!-- Настройки -->
        <div id="settingsPanel" class="panel">
            <div class="settings-section">
                <div class="settings-header">НАСТРОЙКИ</div>
                <div class="setting-item">
                    <span>🎨 Тема оформления</span>
                    <span>▼</span>
                </div>
                <div class="theme-row">
                    <div class="theme-chip" data-theme="default">По умолчанию</div>
                    <div class="theme-chip" data-theme="dark">Тёмная</div>
                    <div class="theme-chip" data-theme="cold">Холодная</div>
                </div>
                <div class="setting-item" id="editProfileItem">
                    <span>✏️ Редактировать профиль</span>
                    <span>→</span>
                </div>
                <div class="setting-item" id="aboutItem">
                    <span>ℹ️ О приложении</span>
                    <span>→</span>
                </div>
                <div class="setting-item" id="logoutSettingsBtn">
                    <span>🚪 Выйти из аккаунта</span>
                    <span>→</span>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-panel="chats"><span>💬</span><div>Чаты</div></div>
        <div class="nav-item" data-panel="contacts"><span>👥</span><div>Контакты</div></div>
        <div class="nav-item" data-panel="settings"><span>⚙️</span><div>Настройки</div></div>
    </div>
</div>

<!-- Экран чата -->
<div id="chatScreen" class="chat-screen" style="display: none;">
    <div class="chat-header">
        <div class="chat-back" id="chatBackBtn">←</div>
        <div class="chat-header-avatar" id="chatAvatar">👤</div>
        <div class="chat-header-name" id="chatName"></div>
    </div>
    <div class="messages" id="messagesList"></div>
    <div class="input-bar">
        <input type="text" id="messageInput" placeholder="Сообщение...">
        <label for="photoUpload">📷</label>
        <input type="file" id="photoUpload" accept="image/*" style="display: none;">
        <button id="videoBtn" class="record-btn">🎥</button>
        <button id="sendBtn">📤</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwu2DALULk_MM0YWtfG4TJCJLU1zl6zNo",
        authDomain: "tgmessanger-c284e.firebaseapp.com",
        databaseURL: "https://tgmessanger-c284e-default-rtdb.firebaseio.com",
        projectId: "tgmessanger-c284e",
        storageBucket: "tgmessanger-c284e.firebasestorage.app",
        messagingSenderId: "386943411130",
        appId: "1:386943411130:web:3fa8c345cae54f6066b383"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let currentUserId = null;
    let currentChatWith = null;
    let currentUserAvatar = null;
    let currentChatName = "";

    let mediaRecorder = null;
    let videoChunks = [];
    let isRecording = false;
    let videoStream = null;

    function generateUserKey(user) {
        if(!user) return null;
        const name = user.email.split('@')[0];
        return `@${name}_${user.uid.slice(-4)}`;
    }

    async function saveUserProfile(user, avatar) {
        const userKey = generateUserKey(user);
        await db.ref(`users/${user.uid}`).set({
            uid: user.uid,
            name: user.email.split('@')[0],
            displayKey: userKey,
            avatar: avatar || null
        });
        return userKey;
    }

    async function getUserProfile(uid) {
        const snap = await db.ref(`users/${uid}`).once('value');
        return snap.val();
    }

    async function addFriend(key) {
        const users = await db.ref('users').once('value');
        let targetUid = null;
        users.forEach(child => {
            if(child.val().displayKey === key) targetUid = child.key;
        });
        if(!targetUid) { toast(`❌ ${key} не найден`); return; }
        if(targetUid === currentUser.uid) { toast("❌ Нельзя добавить себя"); return; }
        
        const exists = await db.ref(`friends/${currentUser.uid}/${targetUid}`).once('value');
        if(exists.exists()) { toast("❌ Уже в друзьях"); return; }
        
        const target = await getUserProfile(targetUid);
        await db.ref(`friends/${currentUser.uid}/${targetUid}`).set({
            uid: targetUid,
            name: target?.name || key,
            key: key,
            avatar: target?.avatar || null
        });
        await db.ref(`friends/${targetUid}/${currentUser.uid}`).set({
            uid: currentUser.uid,
            name: currentUser.email.split('@')[0],
            key: currentUserId,
            avatar: currentUserAvatar
        });
        toast("✅ Друг добавлен");
        loadChats();
        loadContacts();
    }

    async function loadChats() {
        const friends = await db.ref(`friends/${currentUser.uid}`).once('value');
        const list = [];
        friends.forEach(f => list.push(f.val()));
        const container = document.getElementById('chatsList');
        if(list.length === 0) {
            container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">👋 Добавьте друга, чтобы начать общение</div>';
            return;
        }
        container.innerHTML = list.map(f => `
            <div class="chat-item" data-uid="${f.uid}" data-name="${escapeHtml(f.name)}">
                <div class="chat-avatar">${f.avatar ? `<img src="${f.avatar}">` : '👤'}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(f.name)}</div>
                    <div class="chat-preview">Нажмите для чата</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('#chatsList .chat-item').forEach(el => {
            el.addEventListener('click', () => {
                const uid = el.dataset.uid;
                const name = el.dataset.name;
                openChat(uid, name);
            });
        });
    }

    async function loadContacts() {
        const friends = await db.ref(`friends/${currentUser.uid}`).once('value');
        const list = [];
        friends.forEach(f => list.push(f.val()));
        const container = document.getElementById('contactsList');
        if(list.length === 0) {
            container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">👋 Нет контактов</div>';
            return;
        }
        container.innerHTML = list.map(f => `
            <div class="chat-item" data-uid="${f.uid}" data-name="${escapeHtml(f.name)}">
                <div class="chat-avatar">${f.avatar ? `<img src="${f.avatar}">` : '👤'}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(f.name)}</div>
                    <div class="chat-preview">${f.key}</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('#contactsList .chat-item').forEach(el => {
            el.addEventListener('click', () => {
                const uid = el.dataset.uid;
                const name = el.dataset.name;
                openChat(uid, name);
            });
        });
    }

    async function openChat(uid, name) {
        currentChatWith = uid;
        currentChatName = name;
        document.getElementById('chatName').innerText = name;
        
        const profile = await getUserProfile(uid);
        if(profile?.avatar) {
            document.getElementById('chatAvatar').innerHTML = `<img src="${profile.avatar}" style="width:100%;height:100%;object-fit:cover;">`;
        } else {
            document.getElementById('chatAvatar').innerHTML = '👤';
        }
        
        document.getElementById('appMain').style.display = 'none';
        document.getElementById('chatScreen').style.display = 'flex';
        loadMessages(uid);
    }

    async function loadMessages(uid) {
        if(!uid) return;
        const chatId = [currentUser.uid, uid].sort().join('_');
        const ref = db.ref(`messages/${chatId}`);
        ref.off();
        ref.on('value', snap => {
            const msgs = snap.val() || {};
            const arr = Object.values(msgs).sort((a,b) => a.time - b.time);
            renderMessages(arr);
        });
    }

    function renderMessages(msgs) {
        const container = document.getElementById('messagesList');
        if(msgs.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px;">💬 Напишите первое сообщение</div>';
            return;
        }
        container.innerHTML = msgs.map(msg => {
            const isMine = msg.from === currentUser.uid;
            let content = '';
            if(msg.text) content = `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            if(msg.photo) content = `<img src="${msg.photo}" onclick="window.open('${msg.photo}')">`;
            if(msg.video) {
                const vidId = `vid-${msg.time}`;
                content = `
                    <div class="video-msg">
                        <video id="${vidId}" muted loop playsinline><source src="${msg.video}" type="video/mp4"></video>
                        <div class="video-play" onclick="document.getElementById('${vidId}').play()">▶️</div>
                    </div>
                `;
            }
            return `
                <div class="message ${isMine ? 'my' : ''}">
                    ${content}
                    <div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage(text, photo, video) {
        if(!currentChatWith) return;
        const chatId = [currentUser.uid, currentChatWith].sort().join('_');
        await db.ref(`messages/${chatId}`).push().set({
            from: currentUser.uid,
            to: currentChatWith,
            time: Date.now(),
            text: text || null,
            photo: photo || null,
            video: video || null
        });
    }

    function closeChat() {
        document.getElementById('chatScreen').style.display = 'none';
        document.getElementById('appMain').style.display = 'flex';
        currentChatWith = null;
    }

    async function startVideoRecord() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            mediaRecorder = new MediaRecorder(videoStream, { mimeType: 'video/mp4' });
            videoChunks = [];
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) videoChunks.push(e.data); };
            mediaRecorder.onstop = async () => {
                const blob = new Blob(videoChunks, { type: 'video/mp4' });
                const reader = new FileReader();
                reader.onloadend = async () => await sendMessage(null, null, reader.result);
                reader.readAsDataURL(blob);
                videoStream.getTracks().forEach(t => t.stop());
                document.getElementById('videoBtn').classList.remove('recording');
                document.getElementById('videoBtn').textContent = '🎥';
                isRecording = false;
            };
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('videoBtn').classList.add('recording');
            document.getElementById('videoBtn').textContent = '⏹️';
            toast("🔴 Запись... Нажмите ещё раз для остановки");
        } catch(e) { toast("❌ Нет доступа к камере. Разрешите доступ в настройках браузера"); }
    }

    function stopVideoRecord() {
        if(mediaRecorder && isRecording) mediaRecorder.stop();
    }

    function uploadPhoto(file) {
        const reader = new FileReader();
        reader.onload = async e => await sendMessage(null, e.target.result, null);
        reader.readAsDataURL(file);
    }

    function uploadAvatar(file, reg = true) {
        const reader = new FileReader();
        reader.onload = async e => {
            const base64 = e.target.result;
            if(reg) {
                document.getElementById('regAvatarEmoji').innerHTML = `<img src="${base64}" style="width:100%;height:100%;object-fit:cover;">`;
                currentUserAvatar = base64;
            } else {
                document.getElementById('headerAvatarEmoji').innerHTML = `<img src="${base64}" style="width:100%;height:100%;object-fit:cover;">`;
                currentUserAvatar = base64;
                await saveUserProfile(currentUser, base64);
                toast("✅ Аватар обновлён");
                loadChats();
                loadContacts();
            }
        };
        reader.readAsDataURL(file);
    }

    function toast(msg) {
        let t = document.querySelector('.toast');
        if(t) t.remove();
        t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    function setTheme(theme) {
        document.body.className = theme;
        localStorage.setItem('theme', theme);
        document.querySelectorAll('.theme-chip').forEach(chip => {
            if(chip.dataset.theme === theme) chip.classList.add('active');
            else chip.classList.remove('active');
        });
    }

    // Навигация
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const panel = item.dataset.panel;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`${panel}Panel`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            item.classList.add('active');
        });
    });

    // События
    document.getElementById('loginBtn').onclick = async () => {
        const login = document.getElementById('authLogin').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        if(!login || !pass) { toast("Введите логин и пароль"); return; }
        try {
            let cred;
            try { cred = await auth.signInWithEmailAndPassword(login + '@tg.com', pass); }
            catch(e) { cred = await auth.createUserWithEmailAndPassword(login + '@tg.com', pass); }
            currentUser = cred.user;
            currentUserId = generateUserKey(currentUser);
            const profile = await getUserProfile(currentUser.uid);
            if(profile?.avatar) currentUserAvatar = profile.avatar;
            else if(currentUserAvatar) await saveUserProfile(currentUser, currentUserAvatar);
            else await saveUserProfile(currentUser, null);
            
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appMain').style.display = 'flex';
            document.getElementById('currentUsername').innerText = currentUser.email.split('@')[0];
            document.getElementById('myUserId').innerText = currentUserId;
            if(currentUserAvatar) document.getElementById('headerAvatarEmoji').innerHTML = `<img src="${currentUserAvatar}" style="width:100%;height:100%;object-fit:cover;">`;
            loadChats();
            loadContacts();
            toast("Добро пожаловать!");
        } catch(e) { toast("Ошибка: " + e.message); }
    };

    document.getElementById('regAvatarBtn').onclick = () => document.getElementById('regAvatarInput').click();
    document.getElementById('regAvatarInput').onchange = e => { if(e.target.files[0]) uploadAvatar(e.target.files[0], true); };
    document.getElementById('changeAvatarBtn').onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => { if(e.target.files[0]) uploadAvatar(e.target.files[0], false); };
        input.click();
    };
    document.getElementById('editProfileItem').onclick = () => document.getElementById('changeAvatarBtn').click();
    document.getElementById('aboutItem').onclick = () => toast("TGMessenger v3.0\nТолько личные чаты\nС поддержкой камеры");
    document.getElementById('logoutSettingsBtn').onclick = () => auth.signOut().then(() => location.reload());
    document.getElementById('addFriendBtn').onclick = () => {
        const key = prompt("Введите ID друга (например @alex_1a2b):");
        if(key) addFriend(key);
    };
    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('messageInput').value;
        if(text) { await sendMessage(text, null, null); document.getElementById('messageInput').value = ''; }
    };
    document.getElementById('messageInput').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('sendBtn').click(); });
    document.getElementById('photoUpload').onchange = e => { if(e.target.files[0]) uploadPhoto(e.target.files[0]); e.target.value = ''; };
    document.getElementById('videoBtn').onclick = () => { if(isRecording) stopVideoRecord(); else startVideoRecord(); };
    document.getElementById('chatBackBtn').onclick = () => closeChat();

    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);
    document.querySelectorAll('.theme-chip').forEach(chip => {
        chip.addEventListener('click', () => setTheme(chip.dataset.theme));
    });

    auth.onAuthStateChanged(async user => {
        if(user) {
            currentUser = user;
            currentUserId = generateUserKey(currentUser);
            const profile = await getUserProfile(currentUser.uid);
            if(profile?.avatar) currentUserAvatar = profile.avatar;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appMain').style.display = 'flex';
            document.getElementById('currentUsername').innerText = currentUser.email.split('@')[0];
            document.getElementById('myUserId').innerText = currentUserId;
            if(currentUserAvatar) document.getElementById('headerAvatarEmoji').innerHTML = `<img src="${currentUserAvatar}" style="width:100%;height:100%;object-fit:cover;">`;
            loadChats();
            loadContacts();
        }
    });
</script>
</body>
</html>
