<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎤 TGMessenger — Текст + Кружки</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0e0e10;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1f1f2f 0%, #0a0a0f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .auth-card {
            background: rgba(30,30,45,0.95);
            backdrop-filter: blur(10px);
            padding: 32px;
            border-radius: 40px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #2c2c3e;
        }
        .auth-card h2 {
            color: #00e6c3;
            margin-bottom: 24px;
            text-align: center;
        }
        .auth-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1e1e2a;
            border: 1px solid #3a3a50;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
        }
        .auth-card button {
            width: 100%;
            padding: 14px;
            background: #00c3a2;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 15px;
            cursor: pointer;
        }
        .avatar-preview {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #2a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            overflow: hidden;
            border: 3px solid #00c3a2;
        }
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app {
            width: 100%;
            max-width: 550px;
            height: 95vh;
            background: #1a1a24;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .header {
            background: #23232f;
            padding: 12px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2f2f3f;
        }
        .user-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            overflow: hidden;
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .my-id {
            background: #00c3a2;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-family: monospace;
            color: black;
            font-weight: bold;
        }
        .logout-btn {
            background: #3a3a50;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .main-row {
            display: flex;
            flex: 1;
            min-height: 0;
        }
        .chats-sidebar {
            width: 35%;
            background: #121218;
            border-right: 1px solid #2a2a36;
            overflow-y: auto;
            padding: 12px 8px;
        }
        .chat-item {
            background: #1e1e2a;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.1s;
        }
        .chat-item.active {
            background: #00c3a2;
            color: black;
        }
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #3a3a50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: bold;
            font-size: 0.9rem;
        }
        .add-friend-btn {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 8px;
            margin-top: 12px;
            width: 100%;
            border-radius: 28px;
            cursor: pointer;
        }
        .messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #14141e;
        }
        .chat-header {
            padding: 10px 15px;
            background: #1e1e2a;
            border-bottom: 1px solid #2f2f3f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #3a3a50;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .chat-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 85%;
            padding: 8px 14px;
            border-radius: 20px;
            background: #2a2a38;
            color: #eee;
            align-self: flex-start;
        }
        .message.my {
            align-self: flex-end;
            background: #00c3a2;
            color: #0a0a0a;
        }
        .message-text {
            word-wrap: break-word;
        }
        .message img {
            max-width: 200px;
            border-radius: 16px;
            margin-top: 6px;
        }
        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }
        .voice-play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #3a3a50;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            border: none;
            color: white;
        }
        .voice-timeline {
            flex: 1;
            height: 4px;
            background: #5a5a6e;
            border-radius: 2px;
            position: relative;
        }
        .voice-progress {
            width: 0%;
            height: 100%;
            background: #00c3a2;
            border-radius: 2px;
        }
        .voice-duration {
            font-size: 11px;
            opacity: 0.7;
        }
        .message-time {
            font-size: 9px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        .input-row {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #1e1e2a;
            border-top: 1px solid #2f2f3f;
        }
        .input-row input {
            flex: 1;
            background: #0e0e16;
            border: none;
            padding: 10px;
            border-radius: 28px;
            color: white;
            outline: none;
        }
        .input-row button, .input-row label {
            background: #2f2f42;
            width: 44px;
            text-align: center;
            line-height: 42px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            border: none;
            color: white;
        }
        .record-btn {
            background: #ff4444 !important;
        }
        .record-btn.recording {
            animation: pulse 0.5s infinite;
            background: #ff0000 !important;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00c3a2;
            padding: 8px 20px;
            border-radius: 50px;
            color: black;
            z-index: 999;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h2>🔐 TGMessenger</h2>
        <div class="avatar-preview">
            <div class="avatar-circle" id="regAvatarBtn">
                <span id="regAvatarEmoji">👤</span>
            </div>
        </div>
        <input type="text" id="authLogin" placeholder="Логин" autocomplete="off">
        <input type="password" id="authPassword" placeholder="Пароль">
        <input type="file" id="regAvatarInput" accept="image/*" style="display: none;">
        <button id="loginBtn">Войти / Создать аккаунт</button>
    </div>
</div>

<div id="appMain" style="display: none;" class="app">
    <div class="header">
        <div class="user-info">
            <div class="user-avatar" id="changeAvatarBtn">
                <span id="headerAvatarEmoji">👤</span>
            </div>
            <span id="currentUsername"></span>
            <span class="my-id" id="myUserId"></span>
        </div>
        <div class="logout-btn" id="logoutBtn">🚪 Выйти</div>
    </div>
    <div class="main-row">
        <div class="chats-sidebar">
            <div id="chatsList"></div>
            <button id="showAddFriendModal" class="add-friend-btn">➕ Добавить друга по ID</button>
        </div>
        <div class="messages-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
                <div class="chat-header-name" id="chatHeaderName"></div>
            </div>
            <div class="messages-list" id="messagesList"></div>
            <div class="input-row">
                <input type="text" id="messageText" placeholder="Сообщение...">
                <label for="photoInput">🖼️</label>
                <input type="file" id="photoInput" accept="image/*" style="display: none;">
                <button id="voiceRecordBtn" class="record-btn">🎤</button>
                <button id="sendMsgBtn">📤</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwu2DALULk_MM0YWtfG4TJCJLU1zl6zNo",
        authDomain: "tgmessanger-c284e.firebaseapp.com",
        databaseURL: "https://tgmessanger-c284e-default-rtdb.firebaseio.com",
        projectId: "tgmessanger-c284e",
        storageBucket: "tgmessanger-c284e.firebasestorage.app",
        messagingSenderId: "386943411130",
        appId: "1:386943411130:web:3fa8c345cae54f6066b383"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let currentUserId = null;
    let currentChatWith = null;
    let allFriendsList = [];
    let currentUserAvatar = null;
    
    // Для записи голоса
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let recordingStartTime = null;

    function generateUserKey(user) {
        if(!user) return null;
        const emailShort = user.email ? user.email.split('@')[0] : user.uid.slice(0,8);
        return `@${emailShort}_${user.uid.slice(-4)}`;
    }

    async function saveUserProfile(user, customKey = null, avatarBase64 = null) {
        const userKey = customKey || generateUserKey(user);
        const profile = {
            uid: user.uid,
            email: user.email,
            displayKey: userKey,
            name: user.email.split('@')[0],
            createdAt: Date.now()
        };
        if(avatarBase64) profile.avatar = avatarBase64;
        else if(currentUserAvatar) profile.avatar = currentUserAvatar;
        await db.ref(`users/${user.uid}`).set(profile);
        return userKey;
    }

    async function getUserProfile(uid) {
        const snap = await db.ref(`users/${uid}`).once('value');
        return snap.val();
    }

    async function addFriendByKey(friendKey) {
        if(!currentUser) return;
        const usersSnap = await db.ref('users').once('value');
        let targetUid = null;
        usersSnap.forEach(child => {
            const data = child.val();
            if(data.displayKey === friendKey) targetUid = child.key;
        });
        if(!targetUid) { alert(`❌ Пользователь ${friendKey} не найден`); return false; }
        if(targetUid === currentUser.uid) { alert("❌ Нельзя добавить себя"); return false; }
        
        const exists = await db.ref(`friends/${currentUser.uid}/${targetUid}`).once('value');
        if(exists.exists()) { alert("❌ Уже в друзьях"); return false; }
        
        const targetProfile = await getUserProfile(targetUid);
        await db.ref(`friends/${currentUser.uid}/${targetUid}`).set({
            friendUid: targetUid,
            friendName: targetProfile?.name || friendKey,
            friendKey: friendKey,
            friendAvatar: targetProfile?.avatar || null
        });
        await db.ref(`friends/${targetUid}/${currentUser.uid}`).set({
            friendUid: currentUser.uid,
            friendName: currentUser.email.split('@')[0],
            friendKey: currentUserId,
            friendAvatar: currentUserAvatar
        });
        alert(`✅ Друг добавлен!`);
        loadChatsList();
        return true;
    }

    async function loadChatsList() {
        if(!currentUser) return;
        const friendsSnap = await db.ref(`friends/${currentUser.uid}`).once('value');
        const friends = [];
        friendsSnap.forEach(child => friends.push(child.val()));
        allFriendsList = friends;
        const container = document.getElementById('chatsList');
        if(friends.length === 0) {
            container.innerHTML = '<div style="padding:16px;color:#aaa;">👋 Нет друзей. Нажми "Добавить друга"</div>';
            return;
        }
        container.innerHTML = friends.map(f => {
            const avatarHtml = f.friendAvatar ? `<img src="${f.friendAvatar}">` : '<span>👤</span>';
            return `
                <div class="chat-item ${currentChatWith === f.friendUid ? 'active' : ''}" data-uid="${f.friendUid}">
                    <div class="chat-avatar">${avatarHtml}</div>
                    <div class="chat-info"><div class="chat-name">${escapeHtml(f.friendName)}</div></div>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => openChatWith(el.getAttribute('data-uid')));
        });
    }

    async function openChatWith(friendUid) {
        currentChatWith = friendUid;
        const friendProfile = await getUserProfile(friendUid);
        const header = document.getElementById('chatHeader');
        const headerAvatar = document.getElementById('chatHeaderAvatar');
        const headerName = document.getElementById('chatHeaderName');
        
        if(friendProfile) {
            header.style.display = 'flex';
            headerAvatar.innerHTML = friendProfile.avatar ? `<img src="${friendProfile.avatar}">` : '👤';
            headerName.innerText = friendProfile.name || 'Друг';
        }
        loadChatsList();
        loadMessages();
    }

    async function loadMessages() {
        if(!currentChatWith || !currentUser) return;
        const chatId = [currentUser.uid, currentChatWith].sort().join('_');
        const messagesRef = db.ref(`messages/${chatId}`);
        messagesRef.off();
        messagesRef.on('value', (snapshot) => {
            const msgs = snapshot.val() || {};
            const messagesArray = Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp);
            renderMessages(messagesArray);
        });
    }

    function renderMessages(messages) {
        const container = document.getElementById('messagesList');
        if(messages.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">💬 Напишите первое сообщение</div>';
            return;
        }
        container.innerHTML = messages.map(msg => {
            const isMine = msg.senderUid === currentUser.uid;
            let content = '';
            
            if(msg.text) {
                content = `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            }
            if(msg.photo) {
                content += `<img src="${msg.photo}" onclick="window.open('${msg.photo}','_blank')">`;
            }
            if(msg.voice) {
                content = `
                    <div class="voice-message">
                        <button class="voice-play-btn" data-audio="${msg.voice}">▶️</button>
                        <div class="voice-timeline"><div class="voice-progress"></div></div>
                        <span class="voice-duration">${msg.voiceDuration || '0:00'}</span>
                    </div>
                `;
            }
            
            return `
                <div class="message ${isMine ? 'my' : ''}">
                    ${content}
                    <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                </div>
            `;
        }).join('');
        
        // Обработчики для аудио
        document.querySelectorAll('.voice-play-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const audioSrc = btn.getAttribute('data-audio');
                const audio = new Audio(audioSrc);
                const progressBar = btn.parentElement.querySelector('.voice-progress');
                const durationSpan = btn.parentElement.querySelector('.voice-duration');
                
                if(btn.textContent === '▶️') {
                    btn.textContent = '⏸️';
                    audio.play();
                    audio.ontimeupdate = () => {
                        const percent = (audio.currentTime / audio.duration) * 100;
                        if(progressBar) progressBar.style.width = percent + '%';
                    };
                    audio.onended = () => {
                        btn.textContent = '▶️';
                        if(progressBar) progressBar.style.width = '0%';
                    };
                } else {
                    btn.textContent = '▶️';
                    audio.pause();
                }
            });
        });
        
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage(text = null, photoBase64 = null, voiceBase64 = null, voiceDuration = null) {
        if(!currentChatWith || !currentUser) { alert("Выбери чат!"); return; }
        const chatId = [currentUser.uid, currentChatWith].sort().join('_');
        const msg = {
            senderUid: currentUser.uid,
            receiverUid: currentChatWith,
            timestamp: Date.now()
        };
        if(text) msg.text = text;
        if(photoBase64) msg.photo = photoBase64;
        if(voiceBase64) { msg.voice = voiceBase64; msg.voiceDuration = voiceDuration; }
        
        await db.ref(`messages/${chatId}`).push().set(msg);
    }

    async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64 = reader.result;
                const duration = Math.round((Date.now() - recordingStartTime) / 1000);
                const minutes = Math.floor(duration / 60);
                const seconds = duration % 60;
                const durationStr = `${minutes}:${seconds.toString().padStart(2,'0')}`;
                await sendMessage(null, null, base64, durationStr);
                showToast("🎤 Кружок отправлен!");
            };
            reader.readAsDataURL(audioBlob);
            stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start();
        isRecording = true;
        recordingStartTime = Date.now();
        const recordBtn = document.getElementById('voiceRecordBtn');
        recordBtn.classList.add('recording');
        recordBtn.textContent = '⏹️';
        showToast("🔴 Запись... Нажми ещё раз для остановки");
    }

    function stopRecording() {
        if(mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            const recordBtn = document.getElementById('voiceRecordBtn');
            recordBtn.classList.remove('recording');
            recordBtn.textContent = '🎤';
        }
    }

    function uploadPhotoAndSend(file) {
        const reader = new FileReader();
        reader.onload = async (e) => await sendMessage(null, e.target.result);
        reader.readAsDataURL(file);
    }

    function uploadAvatar(file, isRegistration = true) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result;
            currentUserAvatar = base64;
            if(isRegistration) {
                document.getElementById('regAvatarEmoji').innerHTML = `<img src="${base64}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;">`;
            } else {
                document.getElementById('headerAvatarEmoji').innerHTML = `<img src="${base64}" style="width:100%;height:100%;object-fit:cover;">`;
                if(currentUser) await saveUserProfile(currentUser, currentUserId, base64);
                showToast("✅ Аватар обновлён!");
                loadChatsList();
            }
        };
        reader.readAsDataURL(file);
    }

    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if(toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    // Регистрация/вход
    document.getElementById('loginBtn').onclick = async () => {
        const login = document.getElementById('authLogin').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        if(!login || !pass) { alert("Введи логин и пароль"); return; }
        try {
            let userCred;
            try {
                userCred = await auth.signInWithEmailAndPassword(login + '@tg.com', pass);
            } catch(e) {
                userCred = await auth.createUserWithEmailAndPassword(login + '@tg.com', pass);
            }
            currentUser = userCred.user;
            currentUserId = generateUserKey(currentUser);
            const existingProfile = await getUserProfile(currentUser.uid);
            if(existingProfile?.avatar) currentUserAvatar = existingProfile.avatar;
            else if(currentUserAvatar) await saveUserProfile(currentUser, currentUserId, currentUserAvatar);
            else await saveUserProfile(currentUser, currentUserId);
            
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appMain').style.display = 'flex';
            document.getElementById('currentUsername').innerText = currentUser.email.split('@')[0];
            document.getElementById('myUserId').innerText = currentUserId;
            if(currentUserAvatar) document.getElementById('headerAvatarEmoji').innerHTML = `<img src="${currentUserAvatar}" style="width:100%;height:100%;object-fit:cover;">`;
            
            await loadChatsList();
            if(allFriendsList.length > 0) openChatWith(allFriendsList[0].friendUid);
            showToast(`Добро пожаловать!`);
        } catch(err) { alert("Ошибка: " + err.message); }
    };

    document.getElementById('regAvatarBtn').onclick = () => document.getElementById('regAvatarInput').click();
    document.getElementById('regAvatarInput').onchange = (e) => { if(e.target.files[0]) uploadAvatar(e.target.files[0], true); };
    document.getElementById('changeAvatarBtn').onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => { if(e.target.files[0]) uploadAvatar(e.target.files[0], false); };
        input.click();
    };
    document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); location.reload(); };
    document.getElementById('sendMsgBtn').onclick = async () => {
        const text = document.getElementById('messageText').value;
        if(text) { await sendMessage(text); document.getElementById('messageText').value = ''; }
    };
    document.getElementById('showAddFriendModal').onclick = () => {
        const key = prompt("Введите ID друга (например @alex_1a2b):");
        if(key) addFriendByKey(key);
    };
    document.getElementById('photoInput').onchange = (e) => { if(e.target.files[0]) uploadPhotoAndSend(e.target.files[0]); e.target.value = ''; };
    document.getElementById('messageText').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('sendMsgBtn').click(); });
    
    // Запись кружков
    const recordBtn = document.getElementById('voiceRecordBtn');
    recordBtn.onclick = async () => {
        if(isRecording) stopRecording();
        else await startRecording();
    };

    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            currentUserId = generateUserKey(currentUser);
            const profile = await getUserProfile(currentUser.uid);
            if(profile?.avatar) currentUserAvatar = profile.avatar;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appMain').style.display = 'flex';
            document.getElementById('currentUsername').innerText = currentUser.email.split('@')[0];
            document.getElementById('myUserId').innerText = currentUserId;
            if(currentUserAvatar) document.getElementById('headerAvatarEmoji').innerHTML = `<img src="${currentUserAvatar}" style="width:100%;height:100%;object-fit:cover;">`;
            loadChatsList();
        }
    });
</script>
</body>
</html>
